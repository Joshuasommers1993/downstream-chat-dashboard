name: Build & Deploy Dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/trash-gurus/downstream-chat-dashboard:latest
            ghcr.io/trash-gurus/downstream-chat-dashboard:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_BASE_PATH=/dashboard
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DROPLET_SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.DROPLET_KNOWN_HOSTS }}

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.DROPLET_HOST }} << 'DEPLOY'
          set -e
          cd /opt/downstream-chat-dashboard
          docker compose pull
          docker compose up -d --force-recreate
          echo "Deploy complete"
          DEPLOY
